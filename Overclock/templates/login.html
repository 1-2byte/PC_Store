<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OVERCLOCK Login</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        width: 350px;
        padding: 40px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .logo {
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        letter-spacing: 10px;
        color: white;
        margin-bottom: 30px;
    }

    .input-group {
        margin-bottom: 20px;
    }

    .input-group input {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        outline: none;
        background: rgba(255,255,255,0.08);
        color: white;
        font-size: 14px;
        transition: 0.3s ease;
    }

    .input-group input::placeholder {
        color: rgba(255,255,255,0.5);
    }

    .input-group input:focus {
        background: rgba(255,255,255,0.15);
        box-shadow: 0 0 0 2px #6366f1;
    }

    .login-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #6366f1;
        color: white;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: 0.3s ease;
    }

    .login-btn:hover {
        background: #4f46e5;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(99,102,241,0.4);
    }

    .login-btn:active {
        transform: scale(0.97);
    }

    .login-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,0.3),
            transparent
        );
        transition: 0.5s;
    }

    .login-btn:hover::before {
        left: 100%;
    }

    .error {
        color: #f87171;
        font-size: 13px;
        margin-bottom: 10px;
        text-align: center;
    }

    .footer {
        margin-top: 15px;
        text-align: center;
        font-size: 13px;
        color: rgba(255,255,255,0.6);
    }

    .footer a {
        color: #6366f1;
        text-decoration: none;
    }
</style>
</head>

<body>

<div class="container">
    <div class="logo">OVERCLOCK</div>

    <!-- Django Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer">
        Don't have an account? <a href="/register/">Sign up</a>
    </div>


</div>

</body>
</html>
