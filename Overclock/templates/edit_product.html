{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Product - OVERCLOCK</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* ================= GLOBAL ================= */

* {
    cursor: default;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle at 20% 20%, #1e293b, #020617 70%);
    overflow-x: hidden;
    color: white;
    font-family: sans-serif;
    user-select: text;
}

/* ================= CUSTOM SCROLLBAR ================= */

::-webkit-scrollbar {
    width: 10px;
}

::-webkit-scrollbar-track {
    background: #0f172a;
}

::-webkit-scrollbar-thumb {
    background: rgba(99, 102, 241, 0.5);
    border-radius: 20px;
    border: 2px solid #0f172a;
}

/* ================= BACKGROUND GLOW ================= */

body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(99,102,241,0.15), transparent);
    filter: blur(140px);
    top: -100px;
    left: -100px;
    z-index: 0;
}

/* ================= GLASS ================= */

.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.08);
}

/* ================= LOGO ================= */

.logo {
    letter-spacing: 8px;
    transition: 0.3s ease;
}

.logo:hover {
    letter-spacing: 12px;
    transform: scale(1.03);
}

/* ================= INPUT ================= */

.input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    color: white;
    transition: 0.3s ease;
}

.input:focus {
    outline: none;
    border-color: rgba(99,102,241,0.7);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
}

/* ================= NUMBER INPUT ================= */

.number-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    color: white;
    transition: 0.3s ease;
    appearance: none;
    -moz-appearance: textfield;
}

.number-input::-webkit-inner-spin-button,
.number-input::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

.number-input:focus {
    outline: none;
    border-color: rgba(99,102,241,0.7);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
}

.number-wrapper {
    position: relative;
}

.currency-symbol {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #c7d2fe;
    pointer-events: none;
}

.custom-stepper {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.step-btn {
    width: 26px;
    height: 20px;
    border-radius: 8px;
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #c7d2fe;
    font-size: 12px;
}

.step-btn:hover {
    background: rgba(99,102,241,0.3);
}

/* ================= DROPDOWN ================= */

select.input {
    width: 100%;
    padding: 14px 50px 14px 16px;
    border-radius: 14px;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;

    background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 16px center;
    background-size: 18px;
}

select.input option {
    background: #0f172a;
    color: white;
}

/* ================= FILE UPLOAD ================= */

.upload-box {
    border: 2px dashed rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.03);
    transition: 0.3s ease;
    min-height: 240px;
}

.upload-box:hover {
    border-color: rgba(99,102,241,0.7);
    background: rgba(99,102,241,0.08);
}

.file-input {
    display: none;
}

.remove-btn:hover {
    transform: scale(1.08);
}

/* ================= BUTTON ================= */

.btn {
    position: relative;
    overflow: hidden;
    transition: 0.3s ease;
}

.btn:hover {
    transform: translateY(-2px);
}

</style>
</head>

<body class="text-white font-sans">

<div class="max-w-4xl mx-auto pt-14 px-6 relative z-10">

    <div class="text-center mb-10">
        <h1 class="logo text-3xl font-bold">
            O V E R C L O C K
        </h1>
    </div>

    <div class="glass rounded-3xl p-8 shadow-2xl">

        <h2 class="text-3xl font-semibold mb-8">
            Edit Product
        </h2>

        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <!-- NAME -->
            <input
                type="text"
                name="name"
                value="{{ product.name }}"
                class="input w-full px-4 py-3 rounded-xl"
                required
            >

            <!-- DESCRIPTION -->
            <textarea
                name="description"
                class="input w-full px-4 py-3 rounded-xl h-32"
                required
            >{{ product.description }}</textarea>

            <!-- PRICE -->
            <div class="number-wrapper">
                <span class="currency-symbol">₹</span>

                <input
                    type="number"
                    step="0.01"
                    min="0"
                    name="price"
                    value="{{ product.price }}"
                    class="number-input w-full pl-10 pr-16 py-3 rounded-xl"
                    required
                    id="priceInput"
                >

                <div class="custom-stepper">
                    <button type="button" class="step-btn" onclick="stepUpField('priceInput')">▲</button>
                    <button type="button" class="step-btn" onclick="stepDownField('priceInput')">▼</button>
                </div>
            </div>

            <!-- QUANTITY -->
            <div class="number-wrapper">

                <input
                    type="number"
                    min="0"
                    name="quantity"
                    value="{{ product.quantity }}"
                    class="number-input w-full px-4 pr-16 py-3 rounded-xl"
                    required
                    id="quantityInput"
                >

                <div class="custom-stepper">
                    <button type="button" class="step-btn" onclick="stepUpField('quantityInput')">▲</button>
                    <button type="button" class="step-btn" onclick="stepDownField('quantityInput')">▼</button>
                </div>

            </div>

            <select name="category" class="input" required>
                <option value="" disabled>Select a category</option>
                {% for cat in nav_categories %}
                <option value="{{ cat.name }}" {% if product.category == cat.name %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>

            <!-- IMAGE -->
            <div>
                <label
                    for="fileInput"
                    id="uploadBox"
                    class="upload-box rounded-2xl p-6 flex flex-col items-center justify-center text-center cursor-pointer"
                >

                    <div id="uploadContent" class="flex flex-col items-center">

                        <p class="text-sm text-gray-300 mb-3">
                            Drag & Drop image here or Click to Upload
                        </p>

                    </div>

                    <input
                        type="file"
                        name="image"
                        id="fileInput"
                        class="file-input"
                        accept="image/*"
                    >

                    <div id="previewWrapper" class="hidden relative w-full mt-2">

                        <img
                            id="previewImage"
                            class="w-full h-56 object-cover rounded-xl border border-white/10"
                        >

                        <button
                            type="button"
                            id="removeImage"
                            class="remove-btn absolute top-3 right-3 w-8 h-8 rounded-full bg-red-500 text-white text-lg flex items-center justify-center"
                        >
                            ×
                        </button>

                    </div>

                </label>
            </div>

            <!-- BUTTON -->
            <button
                type="submit"
                class="btn bg-indigo-500 px-8 py-3 rounded-full hover:bg-indigo-600"
            >
                Save Product
            </button>

        </form>

    </div>

</div>

<script>

function stepUpField(id) {
    document.getElementById(id).stepUp();
}

function stepDownField(id) {
    const field = document.getElementById(id);
    if (parseFloat(field.value || 0) > 0) {
        field.stepDown();
    }
}

const fileInput = document.getElementById("fileInput");
const previewImage = document.getElementById("previewImage");
const previewWrapper = document.getElementById("previewWrapper");
const removeImage = document.getElementById("removeImage");
const uploadContent = document.getElementById("uploadContent");

function showPreview(file) {
    const reader = new FileReader();

    reader.onload = function(e) {
        previewImage.src = e.target.result;
        uploadContent.classList.add("hidden");
        previewWrapper.classList.remove("hidden");
    };

    reader.readAsDataURL(file);
}

fileInput.addEventListener("change", function () {
    if (this.files && this.files[0]) {
        showPreview(this.files[0]);
    }
});

removeImage.addEventListener("click", function (e) {
    e.preventDefault();
    fileInput.value = "";
    previewImage.src = "";
    previewWrapper.classList.add("hidden");
    uploadContent.classList.remove("hidden");
});

</script>

</body>
</html>
